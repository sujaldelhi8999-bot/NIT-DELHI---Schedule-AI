<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professors — ScheduleAI Wizarding</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/styles.css?v=hp2" />
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">
      <svg viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8"><rect x="1" y="1" width="16" height="16" rx="3"/><line x1="1" y1="6.5" x2="17" y2="6.5"/><line x1="6.5" y1="1" x2="6.5" y2="17"/></svg>
    </div>
    <div><div class="sidebar-brand-name">ScheduleAI</div><div class="sidebar-brand-sub">Professor's Chamber</div></div>
  </div>
  <ul class="sidebar-nav">
    <li class="nav-section-label">Views</li>
    <li class="nav-item active" data-page="my-timetable">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>My Timetable</span>
    </li>
    <li class="nav-item" data-page="section-view">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      <span>Section Timetable</span>
    </li>
    <li class="nav-item" data-page="full-timetable">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <span>Complete Timetable</span>
    </li>
    <li class="nav-section-label">System</li>
    <li class="nav-item" data-page="notifications">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span>Notifications</span>
    </li>
  </ul>
  <div class="sidebar-footer" id="sidebarFooter"></div>
</aside>

<main class="main-content">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div><p class="loading-text">Consulting the Marauder's Map…</p>
  </div>
  <div class="page active" id="page-my-timetable"></div>
  <div class="page" id="page-section-view"></div>
  <div class="page" id="page-full-timetable"></div>
  <div class="page" id="page-notifications"></div>
</main>
<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/api.js"></script><script src="js/data.js"></script><script src="js/export.js"></script><script src="js/utils.js"></script>
<script src="js/health-score.js"></script>
<script src="js/ai-assistant.js"></script>

<script>
const SampleData = { load(){} };
let ME = null;
const AVATAR_COLORS = ['#4448c5','#0f9161','#d63b50','#c47d0e','#8b48c7','#0891b2'];

const App = (() => {
  let currentPage = 'my-timetable';
  const SUBJ_COLORS = 10;
  let colorMap = {}, colorIdx = 0;
  function getColor(cid){ if(!colorMap[cid]){colorIdx++;colorMap[cid]=((colorIdx-1)%SUBJ_COLORS)+1;}return colorMap[cid]; }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showLoadingError(msg) {
    const overlay = document.getElementById('loadingOverlay');
    if(!overlay) return;
    const sp = overlay.querySelector('.spinner');
    const tx = overlay.querySelector('.loading-text');
    if(sp) sp.style.visibility = 'hidden';
    if(tx) tx.innerHTML = msg;
  }
  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if(overlay){ overlay.classList.add('hidden'); setTimeout(()=>{ if(overlay.parentNode) overlay.remove(); }, 400); }
  }

  async function init() {
    try {
      const token = API.getToken(), user = API.getUser();
      if (!token || !user || user.role !== 'teacher') { window.location.href = 'login.html'; return; }

      // Offline-safe: falls back to cached user if server is down
      try { ME = await API.me(); } catch(e) { ME = user; }
      if (!ME) { window.location.href = 'login.html'; return; }

      const color = AVATAR_COLORS[ME.name.charCodeAt(0) % AVATAR_COLORS.length];
      const offlineBadge = API.isOffline() ? '<span style="font-size:.65rem;opacity:.6"> (offline)</span>' : '';
      document.getElementById('sidebarFooter').innerHTML = `<div class="user-card"><div class="user-avatar" style="background:${color}">${ME.name.charAt(0).toUpperCase()}</div><div style="flex:1;min-width:0"><div class="user-name">${esc(ME.name)}</div><div class="user-role">Professor${offlineBadge}</div></div><button class="btn-logout" onclick="App.logout()" title="Sign out"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button></div>`;

      // pullAll silently skips if offline
      await API.pullAll();
      document.querySelectorAll('.nav-item[data-page]').forEach(item => { item.addEventListener('click', () => navigate(item.dataset.page)); });
      renderPage('my-timetable');
      hideLoading();
    } catch(e) {
      console.error('Init error:', e);
      showLoadingError('⚠️ Something went wrong.<br><small>' + e.message + '</small>');
      setTimeout(() => hideLoading(), 2500);
    }
  }
  function navigate(page){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
    const prev=document.querySelector('.page.active');
    if(prev) prev.classList.remove('active');
    const next=document.getElementById(`page-${page}`);
    currentPage=page; renderPage(page);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ if(next) next.classList.add('active'); }); });
  }

  function renderPage(page){
    switch(page){
      case 'my-timetable':   renderMyTimetable(); break;
      case 'section-view':   renderSectionView(); break;
      case 'full-timetable': renderFullTimetable(); break;
      case 'notifications':  renderNotifications(); break;
    }
  }

  function renderGrid(entries, days, slots, interactive=false){
    let html=`<div class="timetable-wrapper"><div class="timetable-grid" style="grid-template-columns:90px repeat(${slots.length},1fr)">`;
    html+=`<div class="tt-header" style="border-radius:var(--radius) 0 0 0"></div>`;
    for(const slot of slots){
      if(slot.isLunch) html+=`<div class="tt-header lunch-h"><span class="time">Lunch</span><span class="time-end">${slot.start}–${slot.end}</span></div>`;
      else html+=`<div class="tt-header"><span class="time">${slot.start}</span><span class="time-end">${slot.end}</span></div>`;
    }
    for(const day of days){
      html+=`<div class="tt-day-label">${day.slice(0,3)}</div>`;
      for(const slot of slots){
        if(slot.isLunch){ html+=`<div class="tt-cell lunch-slot"><span class="lunch-text">Lunch</span></div>`; continue; }
        const cellEntries=entries.filter(e=>e.day===day&&slot.idx>=e.slotIdx&&slot.idx<e.slotIdx+(e.requiredSlots||1));
        if(cellEntries.length>0){
          const e=cellEntries[0], ci=getColor(e.courseId);
          const secNames=(e.sectionIds||[]).map(sid=>Store.sections.get(sid)?.name||sid).join('+');
          const code=Store.courses.get(e.courseId)?.code||e.courseName;
          const slotLabel=`${slot.start}–${slot.end}`;
          const entryJson=encodeURIComponent(JSON.stringify({
            courseId:e.courseId, courseName:e.courseName, day:e.day,
            slotLabel, sectionIds:e.sectionIds||[]
          }));
          const actionBtns=interactive?`<div class="tt-actions">
            <button class="tt-action-btn cancel-btn" title="Cancel class" onclick="App.cancelClass('${entryJson}')">🚫</button>
            <button class="tt-action-btn reschedule-btn" title="Reschedule class" onclick="App.rescheduleClass('${entryJson}')">🔄</button>
            <button class="tt-action-btn ta-btn" title="Assign TA" onclick="App.assignTA('${entryJson}')">👤</button>
            <button class="tt-action-btn sub-btn" title="Assign Substitute Teacher" onclick="App.assignSubstitute('${entryJson}')">🔁</button>
          </div>`:'';
          html+=`<div class="tt-cell"><div class="tt-block sc-${ci}">
            <span class="tt-subject">${esc(code)}</span>
            <span class="tt-detail">${esc(e.facultyName)}</span>
            <span class="tt-detail">${esc(e.roomName||'')}${secNames?' · '+esc(secNames):''}</span>
            ${e.type==='lab'?'<span class="tt-lab-tag">Lab</span>':''}
            ${actionBtns}
          </div></div>`;
        } else { html+=`<div class="tt-cell"></div>`; }
      }
    }
    html+=`</div></div>`; return html;
  }

  function renderMyTimetable(){
    const page=document.getElementById('page-my-timetable');
    const tt=Store.getTimetable(), settings=Store.getSettings();
    const days=settings.daysOfWeek, slots=Store.computeTimeSlots();
    const fids=ME.faculty_ids||[];
    if(!tt){ page.innerHTML=`<div class="page-header"><div><h1>My Timetable</h1><p>Your weekly teaching schedule.</p></div></div><div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><p>No timetable generated yet. Ask your admin to generate one.</p></div>`; return; }
    const entries=[];
    for(const d of days)(tt[d]||[]).forEach(e=>{ if(fids.includes(e.facultyId)) entries.push(e); });
    page.innerHTML=`<div class="page-header"><div><h1>My Timetable</h1><p>Your weekly teaching schedule — ${entries.length} assigned slots. Use 🚫 to cancel, 🔄 to reschedule, 👤 to assign a TA, or 🔁 to assign a substitute.</p></div><div class="btn-group"><button class="btn btn-outline btn-sm" id="btnMyPDF">Export PDF</button><button class="btn btn-outline btn-sm" id="btnMyXL">Export Excel</button></div></div>${renderGrid(entries,days,slots,true)}`;
    document.getElementById('btnMyPDF').addEventListener('click',()=>Export.exportPDF(`Faculty ${ME.name}`,tt,e=>fids.includes(e.facultyId)));
    document.getElementById('btnMyXL').addEventListener('click',()=>Export.exportExcel(`Faculty ${ME.name}`,tt,e=>fids.includes(e.facultyId)));
  }

  function renderSectionView(){
    const page=document.getElementById('page-section-view');
    const tt=Store.getTimetable(), mySections=ME.section_ids||[];
    const allSections=Store.sections.getAll().filter(s=>mySections.includes(s.id));
    const settings=Store.getSettings(), days=settings.daysOfWeek, slots=Store.computeTimeSlots();
    if(!tt||!allSections.length){ page.innerHTML=`<div class="page-header"><div><h1>Section Timetable</h1></div></div><div class="empty-state"><p>No sections assigned or no timetable generated.</p></div>`; return; }
    page.innerHTML=`<div class="page-header"><div><h1>Section Timetable</h1><p>Timetables for sections you teach.</p></div><div class="btn-group"><button class="btn btn-outline btn-sm" id="btnSecPDF">Export PDF</button><button class="btn btn-outline btn-sm" id="btnSecXL">Export Excel</button></div></div><div class="filter-row"><label>Section</label><select class="form-control" id="secSelect" style="max-width:280px">${allSections.map((s,i)=>`<option value="${s.id}"${i===0?' selected':''}>${esc(s.name)} — ${esc(s.semester)}</option>`).join('')}</select></div><div id="secGrid"></div>`;
    function update(){ const sid=document.getElementById('secSelect').value; const entries=[]; for(const d of days)(tt[d]||[]).forEach(e=>{ if((e.sectionIds||[]).includes(sid)) entries.push(e); }); document.getElementById('secGrid').innerHTML=renderGrid(entries,days,slots); }
    update();
    document.getElementById('secSelect').addEventListener('change',update);
    document.getElementById('btnSecPDF').addEventListener('click',()=>{ const sid=document.getElementById('secSelect').value; Export.exportPDF(`Section ${Store.sections.get(sid)?.name||''}`,tt,e=>(e.sectionIds||[]).includes(sid)); });
    document.getElementById('btnSecXL').addEventListener('click',()=>{ const sid=document.getElementById('secSelect').value; Export.exportExcel(`Section ${Store.sections.get(sid)?.name||''}`,tt,e=>(e.sectionIds||[]).includes(sid)); });
  }

  function renderFullTimetable(){
    const page=document.getElementById('page-full-timetable');
    const tt=Store.getTimetable(), sections=Store.sections.getAll();
    const settings=Store.getSettings(), days=settings.daysOfWeek, slots=Store.computeTimeSlots();
    if(!tt||!sections.length){ page.innerHTML=`<div class="page-header"><div><h1>Complete Timetable</h1></div></div><div class="empty-state"><p>No timetable generated yet.</p></div>`; return; }
    page.innerHTML=`<div class="page-header"><div><h1>Complete Timetable</h1><p>All sections — read-only view.</p></div><div class="btn-group"><button class="btn btn-outline btn-sm" id="btnFPDF">Export PDF</button><button class="btn btn-outline btn-sm" id="btnFXL">Export Excel</button></div></div><div class="filter-row"><label>Section</label><select class="form-control" id="fullSec" style="max-width:280px">${sections.map((s,i)=>`<option value="${s.id}"${i===0?' selected':''}>${esc(s.name)}</option>`).join('')}</select></div><div id="fullGrid"></div>`;
    function update(){ const sid=document.getElementById('fullSec').value; const entries=[]; for(const d of days)(tt[d]||[]).forEach(e=>{ if((e.sectionIds||[]).includes(sid)) entries.push(e); }); document.getElementById('fullGrid').innerHTML=renderGrid(entries,days,slots); }
    update();
    document.getElementById('fullSec').addEventListener('change',update);
    document.getElementById('btnFPDF').addEventListener('click',()=>{ const sid=document.getElementById('fullSec').value; Export.exportPDF(`Section ${Store.sections.get(sid)?.name||''}`,tt,e=>(e.sectionIds||[]).includes(sid)); });
    document.getElementById('btnFXL').addEventListener('click',()=>{ const sid=document.getElementById('fullSec').value; Export.exportExcel(`Section ${Store.sections.get(sid)?.name||''}`,tt,e=>(e.sectionIds||[]).includes(sid)); });
  }

  async function renderNotifications(){
    const page=document.getElementById('page-notifications');
    page.innerHTML=`<div class="page-header"><div><h1>Notifications</h1><p>Messages from admin and colleagues.</p></div><button class="btn btn-primary" id="btnSend"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg> Send</button></div><div id="notifList"></div>`;
    document.getElementById('btnSend').addEventListener('click',showNotifModal);
    loadNotifications();
  }

  async function loadNotifications(){
    const c=document.getElementById('notifList'); if(!c) return;
    c.innerHTML=`<div style="display:flex;justify-content:center;padding:32px"><div class="spinner"></div></div>`;
    try{
      const notifs=await API.getNotifications();
      if(!notifs.length){ c.innerHTML=`<div class="empty-state"><p>No notifications yet.</p></div>`; return; }
      c.innerHTML=notifs.map(n=>`<div class="notif-card"><div class="notif-dot"></div><div class="notif-body"><div class="notif-title">${esc(n.title)}</div><div class="notif-msg">${esc(n.message)}</div><div class="notif-meta"><span class="badge badge-primary">${esc(n.sender_role)}</span><span class="badge badge-neutral">→ ${esc(n.target_type)}</span><span class="notif-time">${esc(n.sender_name)} · ${new Date(n.created_at).toLocaleString()}</span></div></div>${n.sender_id===ME.id?`<button class="btn-icon danger" onclick="App.deleteNotif(${n.id})" title="Delete"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>`:''}</div>`).join('');
    } catch{ c.innerHTML=`<div class="conflict-item error">Failed to load notifications.</div>`; }
  }

  async function showNotifModal(){
    const mySections=(ME.section_ids||[]).map(sid=>Store.sections.get(sid)).filter(Boolean);
    modal('Send Notification',`<div class="form-group"><label>Title</label><input class="form-control" id="nTitle" placeholder="Title"/></div><div class="form-group"><label>Message</label><textarea class="form-control" id="nMsg" rows="3"></textarea></div><div class="form-group"><label>Send To</label><select class="form-control" id="nTarget"><option value="students">All My Students</option><option value="section">Specific Section</option></select></div><div class="form-group" id="nSecGrp" style="display:none"><label>Section</label><select class="form-control" id="nSec">${mySections.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>`,()=>{
      const title=document.getElementById('nTitle').value.trim(), message=document.getElementById('nMsg').value.trim();
      const target_type=document.getElementById('nTarget').value;
      const target_section_id=target_type==='section'?document.getElementById('nSec').value:null;
      if(!title||!message){ toast('Title and message required','error'); return false; }
      API.sendNotification({title,message,target_type,target_section_id}).then(()=>{toast('Sent!','success');loadNotifications();}).catch(e=>toast(e.message,'error'));
    },'Send');
    setTimeout(()=>{ document.getElementById('nTarget').addEventListener('change',e=>{ document.getElementById('nSecGrp').style.display=e.target.value==='section'?'':'none'; }); },50);
  }

  async function deleteNotif(id){ if(!confirm('Delete?')) return; try{await API.deleteNotification(id);toast('Deleted','info');loadNotifications();}catch(e){toast(e.message,'error');} }

  function modal(title,bodyHtml,onSave,saveLabel='Save'){
    const mc=document.getElementById('modalContent');
    mc.innerHTML=`<div class="modal-header"><h2>${title}</h2><button class="modal-close" id="mcClose">&times;</button></div><div class="modal-body">${bodyHtml}</div><div class="modal-footer"><button class="btn btn-ghost" id="mcCancel">Cancel</button><button class="btn btn-primary" id="mcSave">${saveLabel}</button></div>`;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('mcClose').addEventListener('click',closeModal);
    document.getElementById('mcCancel').addEventListener('click',closeModal);
    document.getElementById('mcSave').addEventListener('click', async ()=>{
      const saveBtn=document.getElementById('mcSave');
      const result=onSave();
      if(result===false) return;
      if(result && typeof result.then==='function'){
        saveBtn.disabled=true; saveBtn.textContent='Sending…';
        try{ await result; closeModal(); }
        catch(e){ saveBtn.disabled=false; saveBtn.textContent=saveLabel; }
      } else {
        closeModal();
      }
    });
  }
  function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
  const TOAST_ICONS={success:'✓',error:'✕',info:'i',warning:'!'};
  function toast(msg,type='info'){
    const c=document.getElementById('toastContainer'),el=document.createElement('div');
    el.className=`toast ${type}`; el.innerHTML=`<div class="toast-icon">${TOAST_ICONS[type]||'i'}</div><span>${esc(msg)}</span>`;
    c.appendChild(el);
    setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(24px)';el.style.transition='all .25s';setTimeout(()=>el.remove(),280);},3200);
  }
  /* ── Class Alert helpers ──────────────────────── */
  function parseEntryArg(encoded){ try{ return JSON.parse(decodeURIComponent(encoded)); }catch{ return {}; } }

  function getSectionOptions(sectionIds){
    const sections=(sectionIds||[]).map(sid=>Store.sections.get(sid)).filter(Boolean);
    if(!sections.length) return '<option value="">All my students</option>';
    return sections.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  }

  async function cancelClass(encoded){
    const entry=parseEntryArg(encoded);
    const secOptions=getSectionOptions(entry.sectionIds);
    modal('Cancel Class – '+esc(entry.courseName),`
      <div class="alert-info-box">
        <span class="alert-icon">🚫</span>
        <div><strong>${esc(entry.courseName)}</strong><br><small>${esc(entry.day)} &nbsp;·&nbsp; ${esc(entry.slotLabel)}</small></div>
      </div>
      <div class="form-group"><label>Notify Section</label>
        <select class="form-control" id="caSecSel"><option value="">All my sections</option>${secOptions}</select>
      </div>
      <div class="form-group"><label>Additional Note <small>(optional)</small></label>
        <textarea class="form-control" id="caNote" rows="2" placeholder="e.g. Feel free to use the time for self-study"></textarea>
      </div>`,
    ()=>{
      const secId=document.getElementById('caSecSel').value;
      const note=document.getElementById('caNote').value.trim();
      return API.sendClassAlert({
        alert_type:'cancelled', course_name:entry.courseName,
        day:entry.day, slot_label:entry.slotLabel, message:note,
        target_type: secId?'section':'students',
        target_section_id: secId||null
      }).then(()=>toast('Class cancelled — students notified','success'))
        .catch(e=>{ toast(e.message,'error'); throw e; });
    }, 'Cancel Class');
  }

  async function rescheduleClass(encoded){
    const entry=parseEntryArg(encoded);
    const secOptions=getSectionOptions(entry.sectionIds);
    modal('Reschedule Class – '+esc(entry.courseName),`
      <div class="alert-info-box">
        <span class="alert-icon">🔄</span>
        <div><strong>${esc(entry.courseName)}</strong><br><small>Currently: ${esc(entry.day)} &nbsp;·&nbsp; ${esc(entry.slotLabel)}</small></div>
      </div>
      <div class="form-group"><label>Rescheduled To</label>
        <input class="form-control" id="rsTo" placeholder="e.g. Friday 2:00–3:00 PM" />
      </div>
      <div class="form-group"><label>Notify Section</label>
        <select class="form-control" id="rsSecSel"><option value="">All my sections</option>${secOptions}</select>
      </div>
      <div class="form-group"><label>Additional Note <small>(optional)</small></label>
        <textarea class="form-control" id="rsNote" rows="2" placeholder="e.g. Room changed to Lab 3"></textarea>
      </div>`,
    ()=>{
      const rsTo=document.getElementById('rsTo').value.trim();
      if(!rsTo){ toast('Please enter the new time/day','error'); return false; }
      const secId=document.getElementById('rsSecSel').value;
      const note=document.getElementById('rsNote').value.trim();
      return API.sendClassAlert({
        alert_type:'rescheduled', course_name:entry.courseName,
        day:entry.day, slot_label:entry.slotLabel,
        reschedule_to:rsTo, message:note,
        target_type: secId?'section':'students',
        target_section_id: secId||null
      }).then(()=>toast('Students notified of reschedule','success'))
        .catch(e=>{ toast(e.message,'error'); throw e; });
    }, 'Send Reschedule Notice');
  }

  async function assignTA(encoded){
    const entry=parseEntryArg(encoded);
    const secOptions=getSectionOptions(entry.sectionIds);
    modal('Assign TA – '+esc(entry.courseName),`
      <div class="alert-info-box">
        <span class="alert-icon">👤</span>
        <div><strong>${esc(entry.courseName)}</strong><br><small>${esc(entry.day)} &nbsp;·&nbsp; ${esc(entry.slotLabel)}</small></div>
      </div>
      <div class="form-group"><label>TA Name</label>
        <input class="form-control" id="taName" placeholder="Full name of the Teaching Assistant" />
      </div>
      <div class="form-group"><label>Notify Section</label>
        <select class="form-control" id="taSecSel"><option value="">All my sections</option>${secOptions}</select>
      </div>
      <div class="form-group"><label>Additional Note <small>(optional)</small></label>
        <textarea class="form-control" id="taNote" rows="2" placeholder="e.g. Bring your assignment for review"></textarea>
      </div>`,
    ()=>{
      const taName=document.getElementById('taName').value.trim();
      if(!taName){ toast('Please enter the TA name','error'); return false; }
      const secId=document.getElementById('taSecSel').value;
      const note=document.getElementById('taNote').value.trim();
      return API.sendClassAlert({
        alert_type:'ta_assigned', course_name:entry.courseName,
        day:entry.day, slot_label:entry.slotLabel,
        ta_name:taName, message:note,
        target_type: secId?'section':'students',
        target_section_id: secId||null
      }).then(()=>toast('TA assigned — students notified','success'))
        .catch(e=>{ toast(e.message,'error'); throw e; });
    }, 'Assign TA & Notify');
  }

  async function assignSubstitute(encoded){
    const entry=parseEntryArg(encoded);
    const secOptions=getSectionOptions(entry.sectionIds);
    modal('Assign Substitute – '+esc(entry.courseName),`
      <div class="alert-info-box">
        <span class="alert-icon">🔁</span>
        <div><strong>${esc(entry.courseName)}</strong><br><small>${esc(entry.day)} &nbsp;·&nbsp; ${esc(entry.slotLabel)}</small></div>
      </div>
      <div class="form-group"><label>Substitute Teacher Name</label>
        <input class="form-control" id="subName" placeholder="Full name of substitute teacher" />
      </div>
      <div class="form-group"><label>Notify Section</label>
        <select class="form-control" id="subSecSel"><option value="">All my sections</option>${secOptions}</select>
      </div>
      <div class="form-group"><label>Additional Note <small>(optional)</small></label>
        <textarea class="form-control" id="subNote" rows="2" placeholder="e.g. Continue from Chapter 5"></textarea>
      </div>`,
    ()=>{
      const subName=document.getElementById('subName').value.trim();
      if(!subName){ toast('Please enter the substitute teacher name','error'); return false; }
      const secId=document.getElementById('subSecSel').value;
      const note=document.getElementById('subNote').value.trim();
      return API.sendClassAlert({
        alert_type:'substitute', course_name:entry.courseName,
        day:entry.day, slot_label:entry.slotLabel,
        substitute_name:subName, message:note,
        target_type: secId?'section':'students',
        target_section_id: secId||null
      }).then(()=>toast('Substitute assigned — students notified','success'))
        .catch(e=>{ toast(e.message,'error'); throw e; });
    }, 'Assign Substitute & Notify');
  }

  function logout(){ API.clearToken(); window.location.href='login.html'; }
  document.addEventListener('DOMContentLoaded',init);
  return { navigate, logout, deleteNotif, toast, cancelClass, rescheduleClass, assignTA, assignSubstitute };
})();
</script>

<!-- AI ASSISTANT FLOATING BUTTON (teacher/student) -->
<div id="aiFab" style="position:fixed;bottom:28px;right:28px;z-index:9000">
  <button id="aiFabBtn" title="Ask AI about your schedule"
    style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6264A7,#8b5cf6);
           color:#fff;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(98,100,167,.45);
           display:flex;align-items:center;justify-content:center;font-size:1.3rem;
           transition:transform .2s,box-shadow .2s">🤖</button>
</div>

<div id="aiChatDrawer" style="
  position:fixed;bottom:92px;right:28px;z-index:8999;
  width:340px;background:var(--bg-primary,#fff);
  border:1px solid var(--border-color,#e5e7eb);border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
  display:none;flex-direction:column;overflow:hidden;
  font-family:inherit">
  <div style="background:linear-gradient(135deg,#6264A7,#8b5cf6);color:#fff;
              padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-weight:600;font-size:.9rem">✨ AI Schedule Assistant</span>
    <button id="aiDrawerClose" style="background:none;border:none;color:#fff;cursor:pointer;font-size:1.1rem;line-height:1">✕</button>
  </div>
  <div id="aiDrawerChat" style="
    padding:12px;min-height:180px;max-height:300px;overflow-y:auto;
    display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth">
    <div class="ai-chat-bubble assistant" style="max-width:100%;font-size:.82rem;padding:8px 12px;border-radius:12px;
      background:var(--bg-secondary,#f3f4f6);border:1px solid var(--border-color,#e5e7eb)">
      👋 Ask me anything about your schedule!<br>
      <em style="font-size:.78rem;color:var(--text-muted,#888)">e.g. "When is my next lab?" or "Which room am I in on Thursday?"</em>
    </div>
  </div>
  <div style="padding:10px;border-top:1px solid var(--border-color,#e5e7eb);display:flex;gap:8px">
    <input id="aiDrawerInput" type="text" placeholder="Ask about your schedule…"
      style="flex:1;padding:7px 11px;border:1px solid var(--border-color,#e5e7eb);
             border-radius:20px;font-size:.82rem;outline:none;background:var(--bg-primary,#fff);
             color:var(--text-primary,#111)"/>
    <button id="aiDrawerSend"
      style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6264A7,#8b5cf6);
             color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  const fabBtn     = document.getElementById('aiFabBtn');
  const drawer     = document.getElementById('aiChatDrawer');
  const closeBtn   = document.getElementById('aiDrawerClose');
  const sendBtn    = document.getElementById('aiDrawerSend');
  const input      = document.getElementById('aiDrawerInput');
  const chatWin    = document.getElementById('aiDrawerChat');
  let open = false;

  fabBtn.addEventListener('mouseenter', () => { fabBtn.style.transform='scale(1.1)'; fabBtn.style.boxShadow='0 6px 24px rgba(98,100,167,.6)'; });
  fabBtn.addEventListener('mouseleave', () => { fabBtn.style.transform=''; fabBtn.style.boxShadow='0 4px 18px rgba(98,100,167,.45)'; });

  fabBtn.addEventListener('click', () => {
    open = !open;
    drawer.style.display = open ? 'flex' : 'none';
    if (open) { drawer.style.flexDirection = 'column'; input.focus(); }
  });
  closeBtn.addEventListener('click', () => { open = false; drawer.style.display = 'none'; });

  function appendBubble(text, role) {
    const el = document.createElement('div');
    el.style.cssText = 'max-width:90%;padding:7px 11px;border-radius:12px;font-size:.81rem;line-height:1.5;word-break:break-word';
    if (role === 'user') {
      el.style.cssText += ';align-self:flex-end;background:linear-gradient(135deg,#6264A7,#8b5cf6);color:#fff;border-bottom-right-radius:3px';
    } else {
      el.style.cssText += ';align-self:flex-start;background:var(--bg-secondary,#f3f4f6);border:1px solid var(--border-color,#e5e7eb);border-bottom-left-radius:3px;color:var(--text-primary,#111)';
    }
    el.innerHTML = text;
    chatWin.appendChild(el);
    chatWin.scrollTop = chatWin.scrollHeight;
    return el;
  }

  async function send() {
    const msg = input.value.trim();
    if (!msg || typeof AIAssistant === 'undefined') return;
    input.value = '';
    appendBubble(msg, 'user');
    const loadingEl = appendBubble('<em style="color:#888">Thinking…</em>', 'assistant');
    sendBtn.disabled = true;
    try {
      const reply = await AIAssistant.chat(msg);
      loadingEl.innerHTML = reply.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    } catch(e) {
      loadingEl.innerHTML = '<span style="color:#e55">Error: ' + e.message + '</span>';
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); send(); } });
})();
</script>

</body>
