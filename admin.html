<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headmaster — ScheduleAI Wizarding</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/styles.css?v=hp2" />
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">
      <svg viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8"><rect x="1" y="1" width="16" height="16" rx="3"/><line x1="1" y1="6.5" x2="17" y2="6.5"/><line x1="6.5" y1="1" x2="6.5" y2="17"/></svg>
    </div>
    <div>
      <div class="sidebar-brand-name">ScheduleAI</div>
      <div class="sidebar-brand-sub">Admin Panel</div>
    </div>
  </div>

  <ul class="sidebar-nav">
    <li class="nav-section-label">Main</li>
    <li class="nav-item active" data-page="dashboard">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Dashboard</span>
    </li>
    <li class="nav-item" data-page="inputs">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Input Config</span>
    </li>

    <li class="nav-section-label">Views</li>
    <li class="nav-item" data-page="section-view">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      <span>Section View</span>
    </li>
    <li class="nav-item" data-page="faculty-view">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span>Faculty View</span>
    </li>
    <li class="nav-item" data-page="room-view">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Room Utilization</span>
    </li>

    <li class="nav-section-label">System</li>
    <li class="nav-item" data-page="notifications">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span>Notifications</span>
    </li>
  </ul>

  <div class="sidebar-footer" id="sidebarFooter">
    <button class="sidebar-dark-toggle" id="btnDarkMode" onclick="Utils.toggleDarkMode()" title="Toggle dark mode">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      Dark Mode
    </button>
  </div>
</aside>

<main class="main-content" id="mainContent">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p class="loading-text">Opening the Chamber of Data…</p>
  </div>
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-inputs"></div>
  <div class="page" id="page-section-view"></div>
  <div class="page" id="page-faculty-view"></div>
  <div class="page" id="page-room-view"></div>
  <div class="page" id="page-notifications"></div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/constraints.js"></script>
<script src="js/generator.js"></script>
<script src="js/export.js"></script>
<script src="js/health-score.js"></script>
<script src="js/versions.js"></script>
<script src="js/drag-drop.js"></script>
<script src="js/ical.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui-inputs.js"></script>
<script src="js/ui-dashboard.js"></script>
<script src="js/ai-assistant.js"></script>
<script src="js/ui-views.js"></script>

<script>
const SampleData = { load() {} };
const AVATAR_COLORS = ['#4448c5','#0f9161','#d63b50','#c47d0e','#8b48c7','#0891b2'];

const App = (() => {
  let currentPage = 'dashboard';
  let syncTimer = null;

  function showLoadingError(msg) {
    const overlay = document.getElementById('loadingOverlay');
    if(!overlay) return;
    const sp = overlay.querySelector('.spinner');
    const tx = overlay.querySelector('.loading-text');
    if(sp) sp.style.visibility = 'hidden';
    if(tx) tx.innerHTML = msg;
  }
  function hideLoading() {
    const _lo = document.getElementById('loadingOverlay');
    if(_lo){ _lo.classList.add('hidden'); setTimeout(()=>{ if(_lo.parentNode) _lo.remove(); }, 400); }
  }

  async function init() {
    try {
      Utils.initDarkMode();
      const token = API.getToken(), user = API.getUser();
      if(!token || !user || user.role !== 'admin'){
        window.location.href = 'login.html'; return;
      }
      renderUserCard(user);

      // pullAll is offline-safe — silently skips if server not running
      await API.pullAll();

      document.querySelectorAll('.nav-item[data-page]').forEach(item => {
        item.addEventListener('click', () => navigate(item.dataset.page));
      });
      document.getElementById('modalOverlay').addEventListener('click', e => {
        if(e.target === e.currentTarget) closeModal();
      });
      window.addEventListener('store-delete', async () => {
        clearTimeout(syncTimer);
        if(API.isOffline()) return;
        try { await API.pushAll(); }
        catch(e){ console.error('Sync on delete:', e); }
      });
      window.addEventListener('store-change', () => {
        if(currentPage === 'dashboard') UIDashboard.updateStats();
        if(API.isOffline()) return;
        clearTimeout(syncTimer);
        syncTimer = setTimeout(async () => {
          try { await API.pushAll(); }
          catch(e){ console.error('Sync:', e); toast('Sync failed: ' + e.message, 'error'); }
        }, 200);
      });
      renderPage('dashboard');
      hideLoading();
    } catch(e) {
      console.error('Init error:', e);
      showLoadingError('⚠️ Something went wrong.<br><small>'+e.message+'</small>');
      setTimeout(() => hideLoading(), 2500);
    }
  }
  function renderUserCard(user) {
    const color = AVATAR_COLORS[user.name.charCodeAt(0) % AVATAR_COLORS.length];
    document.getElementById('sidebarFooter').innerHTML = `
      <div class="user-card">
        <div class="user-avatar" style="background:${color}">${user.name.charAt(0).toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div class="user-name" title="${esc(user.name)}">${esc(user.name)}</div>
          <div class="user-role">Administrator</div>
        </div>
        <button class="btn-logout" onclick="App.logout()" title="Sign out">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>`;
  }

  function navigate(page) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
    const prev=document.querySelector('.page.active');
    if(prev) prev.classList.remove('active');
    const next=document.getElementById(`page-${page}`);
    currentPage = page;
    renderPage(page);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ if(next) next.classList.add('active'); }); });
  }

  function renderPage(page) {
    switch(page){
      case 'dashboard':    UIDashboard.render(); break;
      case 'inputs':       UIInputs.render(); break;
      case 'section-view': UIViews.renderSectionView(); break;
      case 'faculty-view': UIViews.renderFacultyView(); break;
      case 'room-view':    UIViews.renderRoomView(); break;
      case 'notifications':renderNotificationsPage(); break;
    }
  }

  /* ── MODAL ── */
  function modal(title, bodyHtml, onSave, saveLabel = 'Save') {
    const mc = document.getElementById('modalContent');
    mc.innerHTML = `
      <div class="modal-header">
        <h2>${title}</h2>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="modalSaveBtn">${saveLabel}</button>
      </div>`;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalSaveBtn').addEventListener('click', () => {
      if(onSave() !== false) closeModal();
    });
    setTimeout(() => { const f = mc.querySelector('input,select,textarea'); if(f) f.focus(); }, 80);
  }
  function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

  /* ── TOAST ── */
  const TOAST_ICONS = { success:'✓', error:'✕', info:'i', warning:'!' };
  function toast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div class="toast-icon">${TOAST_ICONS[type]||'i'}</div><span>${esc(message)}</span>`;
    container.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0'; el.style.transform = 'translateX(24px)';
      el.style.transition = 'all .25s ease';
      setTimeout(() => el.remove(), 280);
    }, 3200);
  }

  function logout(){ API.clearToken(); window.location.href = 'login.html'; }

  /* ── NOTIFICATIONS PAGE ── */
  async function renderNotificationsPage() {
    const page = document.getElementById('page-notifications');
    page.innerHTML = `
      <div class="page-header">
        <div>
          <h1>Notifications</h1>
          <p>Broadcast messages to teachers, students, or everyone.</p>
        </div>
        <button class="btn btn-primary" id="btnSendNotif">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          New Notification
        </button>
      </div>
      <div id="notifList"></div>`;
    document.getElementById('btnSendNotif').addEventListener('click', showNotifModal);
    loadNotifications();
  }

  async function loadNotifications() {
    const container = document.getElementById('notifList');
    if(!container) return;
    container.innerHTML = `<div style="display:flex;justify-content:center;padding:32px"><div class="spinner"></div></div>`;
    try {
      const notifs = await API.getNotifications();
      if(!notifs.length){
        container.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><p>No notifications yet. Send one to get started.</p></div>`;
        return;
      }
      container.innerHTML = notifs.map(n => `
        <div class="notif-card">
          <div class="notif-dot"></div>
          <div class="notif-body">
            <div class="notif-title">${esc(n.title)}</div>
            <div class="notif-msg">${esc(n.message)}</div>
            <div class="notif-meta">
              <span class="badge badge-primary">${esc(n.sender_role)}</span>
              <span class="badge badge-neutral">→ ${esc(n.target_type)}${n.target_section_id ? ' ('+esc(n.target_section_id)+')' : ''}</span>
              <span class="notif-time">${esc(n.sender_name)} · ${new Date(n.created_at).toLocaleString()}</span>
            </div>
          </div>
          <button class="btn-icon danger" onclick="App.deleteNotif(${n.id})" title="Delete notification">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </div>`).join('');
    } catch(e){
      container.innerHTML = `<div class="conflict-item error"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Failed to load notifications.</div>`;
    }
  }

  async function showNotifModal() {
    const sections = await API.getSections();
    modal('Send Notification', `
      <div class="form-group"><label>Title</label><input class="form-control" id="nTitle" placeholder="Notification title" /></div>
      <div class="form-group"><label>Message</label><textarea class="form-control" id="nMessage" rows="3" placeholder="Write your message…"></textarea></div>
      <div class="form-group"><label>Audience</label>
        <select class="form-control" id="nTarget">
          <option value="all">Everyone</option>
          <option value="teachers">All Teachers</option>
          <option value="students">All Students</option>
          <option value="section">Specific Section</option>
        </select>
      </div>
      <div class="form-group" id="nSectionGroup" style="display:none"><label>Section</label>
        <select class="form-control" id="nSection">
          ${sections.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}
        </select>
      </div>`, () => {
      const title = document.getElementById('nTitle').value.trim();
      const message = document.getElementById('nMessage').value.trim();
      const target_type = document.getElementById('nTarget').value;
      const target_section_id = target_type === 'section' ? document.getElementById('nSection')?.value : null;
      if(!title || !message){ toast('Title and message are required', 'error'); return false; }
      API.sendNotification({ title, message, target_type, target_section_id })
        .then(() => { toast('Notification sent!', 'success'); loadNotifications(); })
        .catch(e => toast(e.message, 'error'));
    }, 'Send');
    setTimeout(() => {
      document.getElementById('nTarget').addEventListener('change', e => {
        document.getElementById('nSectionGroup').style.display = e.target.value === 'section' ? '' : 'none';
      });
    }, 50);
  }

  async function deleteNotif(id) {
    if(!confirm('Delete this notification?')) return;
    try {
      await API.deleteNotification(id);
      toast('Notification deleted', 'info');
      loadNotifications();
    } catch(e){ toast(e.message, 'error'); }
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.addEventListener('DOMContentLoaded', init);
  return { navigate, modal, closeModal, toast, logout, deleteNotif };
})();
</script>
</body>
</html>
